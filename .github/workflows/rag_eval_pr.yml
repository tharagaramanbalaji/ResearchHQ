name: RAG Smoke Evaluation

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  smoke-eval:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Index ChromaDB
        run: |
          python scripts/corpus/index_chroma.py --data-dir data/llm_ai_2023_2026

      - name: Run RAG Evaluation Gate (Smoke Test)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/run_eval_ci.py \
            --limit 15 \
            --min-evaluated 10 \
            --min-faithfulness 0.80 \
            --min-answer-relevancy 0.75

      - name: Comment Results on Pull Request
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/comment_pr_summary.py

      - name: Upload Evaluation Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-eval-smoke-results
          path: |
            data/evaluation/ragas_results.csv
            data/evaluation/ragas_summary.json
            data/evaluation/*.log
          if-no-files-found: ignore
